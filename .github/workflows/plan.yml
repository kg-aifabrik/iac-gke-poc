name: terraform-plan

on:
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/**"

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  WIF_PROVIDER: projects/783778742587/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  CI_SA: k8s-iac-poc-ci@k8s-iac-poc.iam.gserviceaccount.com

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.CI_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - run: terraform init -input=false

      - run: terraform validate -no-color

      - id: plan
        run: terraform plan -input=false -var-file=poc.tfvars -no-color -out=tfplan 2>&1 | tee plan.txt

      - uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/plan.txt

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let plan = fs.readFileSync('terraform/plan.txt', 'utf8');
            if (plan.length > 60000) plan = '...(truncated)...\n' + plan.slice(-60000);
            const body = `### Terraform Plan\n<details><summary>show</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
