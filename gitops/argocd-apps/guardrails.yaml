apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: guardrails
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kg-aifabrik/iac-gke-poc
    targetRevision: main
    path: gitops/guardrails
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
